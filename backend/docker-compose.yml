services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideverse-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - rideverse
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rideverse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rideverse
      POSTGRES_PASSWORD: rideverse
      POSTGRES_DB: rideverse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rideverse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideverse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rideverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rideverse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideverse-worker
    command: celery -A app.workers.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - rideverse
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rideverse-beat
    command: celery -A app.workers.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - rideverse
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  rideverse:
    driver: bridge
